# GitHub Actions workflow for testing, building, and publishing a GitHub Release
# when a version tag is pushed.
#
# Triggers:
# - Pushes of tags matching v*.*.* (example: v1.0.0)
#
# Actions performed:
# - Check out the repository
# - Install Python 3.11
# - Upgrade pip
# - If a test extra is defined in pyproject.toml:
#   - Install the package in editable mode with test dependencies
#   - Run the pytest suite
# - Build distribution artifacts
#   - wheel (.whl)
#   - source distribution (.tar.gz)
# - Create a GitHub Release for the pushed tag
# - Upload the built files from dist/ to that release
name: Test, Build, and Publish GitHub Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  # Required so the workflow can create a GitHub Release.
  contents: write

jobs:
  test-package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Check whether test dependencies are defined
        id: check_test_extra
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          pyproject = Path("pyproject.toml")
          has_test_extra = False

          if pyproject.exists():
              data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
              has_test_extra = "test" in (
                  data.get("project", {}).get("optional-dependencies", {})
              )

          with open(Path.cwd() / "github_output.txt", "w", encoding="utf-8") as f:
              f.write(f"has_test_extra={'true' if has_test_extra else 'false'}\n")
          PY

          cat github_output.txt >> "$GITHUB_OUTPUT"

      - name: Install package and test dependencies
        if: steps.check_test_extra.outputs.has_test_extra == 'true'
        run: pip install -e ".[test]"

      - name: Run pytest test suite
        if: steps.check_test_extra.outputs.has_test_extra == 'true'
        run: pytest -q

  build-and-publish-release:
    runs-on: ubuntu-latest
    needs: test-package

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build
          ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
